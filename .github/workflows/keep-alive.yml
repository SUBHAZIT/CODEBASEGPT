name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Keep-Alive Script
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Add more secrets as needed for multiple projects
          # PROJECT_2_ANON_KEY: ${{ secrets.PROJECT_2_ANON_KEY }}
          RANDOM_DELAY: 'true'
        run: node scripts/keep-alive/ping.js
