<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --background: #020617;
      --foreground: #f8fafc;
      --primary: #14b8a6; /* teal-500 */
      --primary-foreground: #020617;
      --muted: #1e293b;
      --muted-foreground: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --card: rgba(255, 255, 255, 0.03);
    }

    body {
      width: 320px;
      margin: 0;
      padding: 20px;
      background-color: var(--background);
      color: var(--foreground);
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Blueprint Grid Effect */
    .blueprint-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(20, 184, 166, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(20, 184, 166, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }

    /* Center Glow */
    .teal-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at center, var(--primary), transparent 70%);
      opacity: 0.15;
      filter: blur(40px);
      pointer-events: none;
      z-index: -1;
    }

    /* Corner Frames */
    .corner {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 1px solid rgba(20, 184, 166, 0.3);
      pointer-events: none;
    }
    .corner::after {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      border: 1.5px solid var(--primary);
    }
    .corner-tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
    .corner-tl::after { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
    .corner-tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
    .corner-tr::after { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
    .corner-bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
    .corner-bl::after { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
    .corner-br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }
    .corner-br::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      position: relative;
    }
    .logo-box {
      width: 32px;
      height: 32px;
      background: rgba(20, 184, 166, 0.1);
      border: 1px solid rgba(20, 184, 166, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      margin: 0;
      color: var(--foreground);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
    }
    .card h2 {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 14px;
      margin: 0 0 12px 0;
      color: var(--muted-foreground);
      letter-spacing: -0.01em;
    }

    .repo-name-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--foreground);
      margin-bottom: 16px;
      word-break: break-all;
    }

    .btn {
      width: 100%;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-primary {
      background: var(--primary);
      color: black;
      box-shadow: 0 4px 12px rgba(20, 184, 166, 0.2);
    }
    .btn-primary:hover {
      background: #0d9488; /* teal-600 */
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 6px 16px rgba(20, 184, 166, 0.3);
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: white;
      border: 1px solid var(--border);
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(20, 184, 166, 0.3);
    }

    .status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.2);
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="blueprint-grid"></div>
  <div class="teal-glow"></div>
  
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="header">
    <div class="logo-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
    </div>
    <h1>CodebaseGPT</h1>
  </div>
  
  <div class="card">
    <h2>Current Repository</h2>
    <div id="repo-name" class="repo-name-text">Navigating...</div>
    <button id="index-now" class="btn btn-primary">Index Repo</button>
  </div>

  <div class="card">
    <h2>Quick Links</h2>
    <div style="display: flex; gap: 8px;">
      <button id="open-dashboard" class="btn btn-secondary" style="margin-top: 0; flex: 1;">Dashboard</button>
      <button id="open-chat" class="btn btn-secondary" style="margin-top: 0; flex: 1;">AI Chat</button>
    </div>
    <div style="margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; display: flex; justify-content: space-between; align-items: center;">
      <span style="font-size: 8px; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;">CLOUD SYNC</span>
      <button id="config-url" style="background: transparent; border: none; color: var(--primary); font-size: 8px; cursor: pointer; text-decoration: underline; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; font-weight: 800;">Change URL</button>
    </div>
  </div>

  <div class="status">v1.0.0 | Connected</div>

  <script src="popup.js"></script>
</body>
</html>
