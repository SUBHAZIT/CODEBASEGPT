<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #09090b;
      color: white;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .header img {
      width: 32px;
      height: 32px;
    }
    .header h1 {
      font-size: 18px;
      margin: 0;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 14px;
      margin: 0 0 8px 0;
      color: #a1a1aa;
    }
    .btn {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
    }
    .btn-secondary {
      background: #27272a;
      color: #f4f4f5;
      margin-top: 8px;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .status {
      font-size: 12px;
      color: #71717a;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="CodebaseGPT">
    <h1>CodebaseGPT</h1>
  </div>
  
  <div class="card">
    <h2>Current Repository</h2>
    <div id="repo-name" style="font-size: 13px; font-weight: 500; margin-bottom: 12px;">Navigating...</div>
    <button id="index-now" class="btn btn-primary">Index This Repo</button>
  </div>

  <div class="card">
    <h2>Quick Links</h2>
    <button id="open-dashboard" class="btn btn-secondary">Open Dashboard</button>
    <button id="open-chat" class="btn btn-secondary">Open AI Chat</button>
  </div>

  <div class="status">v1.0.0 | Connected to Supabase</div>

  <script src="popup.js"></script>
</body>
</html>
